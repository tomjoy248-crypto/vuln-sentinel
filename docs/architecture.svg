  <rect x="235" y="205" width="75" height="22" rx="5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="272" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4f46e5">骨架屏</text>

