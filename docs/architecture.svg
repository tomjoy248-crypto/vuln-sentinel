<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="successGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#1e293b">漏洞哨兵 V11.4 架构图</text>

  <!-- User Layer -->
  <rect x="40" y="60" width="820" height="70" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="82" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#64748b">用户层</text>
  <rect x="100" y="92" width="110" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="155" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">浏览器 / 移动端</text>
  <rect x="240" y="92" width="110" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="295" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">API 客户端</text>
  <rect x="380" y="92" width="110" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="435" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">离线 HTML</text>
  <rect x="520" y="92" width="110" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="575" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">GitHub Actions</text>
  <rect x="660" y="92" width="110" height="28" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="715" y="110" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#475569">Docker / K8s</text>

