  <text x="802" y="345" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4f46e5">tickets</text>

  <rect x="475" y="360" width="85" height="22" rx="5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="517" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4f46e5">alerts</text>
  <rect x="570" y="360" width="170" height="22" rx="5" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <text x="655" y="375" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#4f46e5">verifications</text>

  <rect x="475" y="395" width="370" height="18" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="660" y="408" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#94a3b8">JWT Secret 文件持久化 · 自动数据库迁移</text>

