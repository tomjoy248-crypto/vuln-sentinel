  <rect x="760" y="465" width="85" height="22" rx="5" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="802" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#0284c7">离线 HTML</text>
