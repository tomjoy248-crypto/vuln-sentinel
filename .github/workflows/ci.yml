name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --break-system-packages
          pip install pytest-asyncio --break-system-packages

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short
        env:
          JWT_SECRET: ci-test-secret-key-32chars-long!!
          TLS_VERIFY: "false"

      - name: Start server
        run: |
          python3 main.py &
          sleep 5
        env:
          JWT_SECRET: ci-test-secret-key-32chars-long!!
          TLS_VERIFY: "false"

      - name: Health check
        run: |
          curl -sf http://localhost:8000/api/health || exit 1

      - name: Version check
        run: |
          curl -sf http://localhost:8000/api/version | grep -q '"version":"11.5"' || exit 1

      - name: Public demo scan (example.com)
        id: demo_scan
        run: |
          RESULT=$(curl -sf -X POST http://localhost:8000/api/scan/public-demo \
            -H "Content-Type: application/json" \
            -d '{"url": "https://example.com"}')
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "$RESULT" | python3 -m json.tool
          # Verify scan_id is present
          echo "$RESULT" | grep -q '"scan_id"' || { echo "ERROR: scan_id missing"; exit 1; }
          # Verify score is within reasonable range
          SCORE=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['score'])")
          if [ "$SCORE" -lt 50 ] || [ "$SCORE" -gt 100 ]; then
            echo "ERROR: score $SCORE out of range"
            exit 1
          fi

      - name: Comment PR with scan result
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = JSON.parse('${{ steps.demo_scan.outputs.result }}' || '{}');
            const score = result.score || 'N/A';
            const scanId = result.scan_id || 'N/A';
            const findings = (result.findings || []).length;
            const body = `## 🛡️ 漏洞哨兵 V11.5 CI 扫描结果

| 指标 | 值 |
|---|---|
| 评分 | ${score}/100 |
| 发现数 | ${findings} |
| Scan ID | ${scanId} |
| TLS 验证 | ${result.tls_verify_skipped ? '⚠️ 跳过（诊断模式）' : '✅ 已启用'} |

> 本次扫描目标：example.com（公开演示）`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
